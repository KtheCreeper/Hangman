<!DOCTYPE html>
<html class="document">
  <head>
    
  </head>
  <body>
    <nav class="navbar">
      <div class="titlebox"><h1 class="title">Hangman</h1></div>
      <div class="links">
        <div class="linkbox"><a class="link" href="#">4 letter</a></div>
        <div class="linkbox"><a class="link" href="#">5 letter</a></div>
        <div class="linkbox"><a class="link" href="#">6 letter</a></div>
        <div class="linkbox"><a class="link" href="#">7 letter</a></div>
      </div>
    </nav>
    <div class="game">
      <img src="hangman-states/Penjat_-_1.svg" id="hmstate" />
      <p id="hmgametxt" class="hmgametxt"></p>
      <p id="hmtxt" class="hmtxt"></p>
      <form id="guessForm">
        <input type="text" id="guess" name="guess" autocomplete="off" />
        <input type="submit" value="Submit" />
      </form>
      <p id="guessedletters"></p>
    </div>
    <div id="keyboard" class="keyboard"></div>
	<div id="winscreen" class="winscreen hidden">
	  <h2></h2>
	  <p id="winword" class="winword"></p>
	  <p id="winscore" class="winscore"></p>
	  <button id="playagain">Play Again</button>
	</div>
	<script src="script.js"></script>
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </body>
</html>
